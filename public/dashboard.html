<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="bg-success container-fluid p-3">
      <div class="row">
        <div class="col ps-5">
          <h1 class="text-light fs-3 fw-light">Dashboard</h1>
        </div>
        <div class="col text-end pe-5">
          <button id="signOut" class="btn btn-outline-warning">Sign Out</button>
        </div>
      </div>
    </div>

    <div id="display" class="mx-auto col-7 border p-3 my-4 shadow"></div>

    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      import {
        getDatabase,
        ref,
        onValue,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries

      // Your web app's Firebase configuration
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      const firebaseConfig = {
    apiKey: "AIzaSyAM9LLOloh0uy3aOaiffPVpiYTc7rvHB74",
    authDomain: "gym-manager-b45f0.firebaseapp.com",
    projectId: "gym-manager-b45f0",
    storageBucket: "gym-manager-b45f0.firebasestorage.app",
    messagingSenderId: "999565698461",
    appId: "1:999565698461:web:d96ed2dfbf8fbc1e92bb74",
    measurementId: "G-H6XQ6K0YX8"
  };


      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth();
      const database = getDatabase();

      onAuthStateChanged(auth, (user) => {
        if (user) {
          const uid = user.uid;
          console.log(uid);

          const userRef = ref(database, `user/${uid}`);
          onValue(userRef, (snapshot) => {
            const data = snapshot.val();

            console.log(data);

            display.innerHTML = `
                <h1>First Name: ${data.firstname}</h1>
                <h1>Last Name: ${data.lastname}</h1>
                <p>Email: ${data.email}</p>
                <p>Gender: ${data.gender}</p>
                <p>Registered Date: ${data.createdAt}</li>
              `;
          });
        } else {
        }
      });

      document.getElementById("signOut").addEventListener("click", () => {
        signOut(auth).then(() => {
          console.log("sign out successful");

          location.href = "./signin.html";
        });
      });
    </script>
  </body>
</html>
