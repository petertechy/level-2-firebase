<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="mx-auto col-7 my-4 p-3 rounded-3 rounded-3 shadow">
      <h1>Sign Up</h1>
      <input
        class="form-control mb-3"
        type="text"
        placeholder="firstname"
        id="firstname"
      />
      <input
        class="form-control mb-3"
        type="text"
        placeholder="lastname"
        id="lastname"
      />
      <select name="" id="gender" class="form-select mb-3">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
      <input
        class="form-control mb-3"
        type="text"
        placeholder="email"
        id="email"
      />
      <input
        class="form-control mb-3"
        type="text"
        placeholder="password"
        id="password"
      />
      <button id="signUp" class="btn btn-success w-100">Sign Up</button>
    </div>

    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        GoogleAuthProvider,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
      import {
        getDatabase,
        ref,
        set,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries

      // Your web app's Firebase configuration
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      const firebaseConfig = {
        apiKey: "AIzaSyAM9LLOloh0uy3aOaiffPVpiYTc7rvHB74",
        authDomain: "gym-manager-b45f0.firebaseapp.com",
        projectId: "gym-manager-b45f0",
        storageBucket: "gym-manager-b45f0.firebasestorage.app",
        messagingSenderId: "999565698461",
        appId: "1:999565698461:web:d96ed2dfbf8fbc1e92bb74",
        measurementId: "G-H6XQ6K0YX8",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth();
      const db = getDatabase();

      document.getElementById("signUp").addEventListener("click", () => {
        // console.log("Yessssssssssssssssssssssss")
        let firstname = document.getElementById("firstname").value;
        let lastname = document.getElementById("lastname").value;
        let gender = document.getElementById("gender").value;
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        let userInfo = { firstname, lastname, gender, email };

        console.log(userInfo);

        createUserWithEmailAndPassword(auth, email, password)
          .then((response) => {
            console.log(response);
            let uid = response.user.uid

            console.log(uid)

            let userRef = ref(db, `users/${uid}`);
            set(userRef, userInfo)
              .then(() => {
                console.log("User Info saved");
              })
              .catch((error) => {
                console.log(error);
              });
          })
          .catch((error) => {
            console.log(error);
          });
      });
    </script>
  </body>
</html>
